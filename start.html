<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>页面自动跳转中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 1.5rem;
        }

        /* 优雅卡片容器 */
        .card {
            max-width: 620px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
        }

        /* 动态加载指示器 */
        .loader-wrapper {
            margin: 1.5rem 0 1.2rem;
            display: flex;
            justify-content: center;
        }

        .loader {
            width: 52px;
            height: 52px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 主标题 */
        .title {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e293b, #2d3a4e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        /* 提示消息 */
        .message {
            font-size: 1.1rem;
            color: #334155;
            background: #f8fafc;
            padding: 0.9rem 1.2rem;
            border-radius: 1.5rem;
            margin: 1.2rem 0 1rem;
            line-height: 1.45;
            border: 1px solid #e2edff;
            display: inline-block;
            width: auto;
        }

        /* 倒计时强调 */
        .countdown {
            font-weight: 700;
            font-size: 1.3rem;
            background: #0f172a;
            color: white;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            margin: 0 0.2rem;
            letter-spacing: 1px;
        }

        /* 手动操作区域 */
        .manual-section {
            margin-top: 1.8rem;
            padding-top: 1.5rem;
            border-top: 2px dashed #cbd5e1;
        }

        .manual-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .link-box {
            background: #f1f5f9;
            border-radius: 60px;
            padding: 0.3rem 0.3rem 0.3rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid #cbd5e1;
            transition: all 0.2s;
        }

        .link-box:hover {
            background: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59,130,246,0.15);
        }

        .target-url {
            font-size: 0.9rem;
            word-break: break-all;
            text-align: left;
            flex: 1;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #1e40af;
            background: transparent;
            border: none;
            padding: 0.5rem 0;
            outline: none;
        }

        .copy-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background: #2563eb;
            transform: scale(0.97);
        }

        .copy-btn:active {
            background: #1d4ed8;
        }

        .copy-feedback {
            font-size: 0.75rem;
            margin-left: 6px;
            color: #10b981;
            font-weight: 500;
        }

        .footnote {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #6c757d;
        }

        /* 响应式微调 */
        @media (max-width: 500px) {
            .card {
                padding: 1.5rem;
            }
            .title {
                font-size: 1.5rem;
            }
            .message {
                font-size: 0.95rem;
            }
            .link-box {
                flex-direction: column;
                align-items: stretch;
                border-radius: 1.2rem;
                padding: 0.8rem;
            }
            .copy-btn {
                justify-content: center;
            }
            .target-url {
                text-align: center;
                padding: 0.4rem;
            }
        }

        button {
            background: none;
            border: none;
        }
    </style>
</head>
<body>

<div class="card" id="app">
    <!-- 转发动效与倒计时区域 -->
    <div class="loader-wrapper">
        <div class="loader"></div>
    </div>
    <div class="title">
        🔄 即将跳转
    </div>
    <div class="message">
        <span id="infoText">页面正在尝试自动跳转，剩余 </span>
        <span class="countdown" id="countdownNum">5</span>
        <span> 秒</span>
    </div>
    <div id="redirectMsg" style="font-size:0.85rem; color:#4b5563; margin-top:6px;">
        若浏览器未自动跳转，请使用下方链接手动访问
    </div>

    <!-- 手动操作区域：展示目标链接 + 复制按钮 -->
    <div class="manual-section">
        <div class="manual-label">
            📎 目标链接 (点击复制或手动打开)
        </div>
        <div class="link-box">
            <input type="text" readonly id="targetUrlInput" class="target-url" value="">
            <button id="copyButton" class="copy-btn">
                📋 复制链接
            </button>
        </div>
        <div id="copyMessage" class="copy-feedback" style="margin-top: 8px;"></div>
    </div>
    <div class="footnote">
        ⚡ 如果未自动跳转，请手动复制上方链接并在新标签页中打开。
    </div>
</div>

<script>
    (function() {
        // ======================= 可配置项 =======================
        // 请在这里修改为您需要跳转的目标网址 (完整URL)
        const TARGET_URL = "https://pavilion-vol-wiring-bodies.trycloudflare.com";   // ← 修改此处即可 (例如 "https://www.google.com")
        // 倒计时秒数 (建议 3~8 秒之间, 给予用户阅读时间)
        const COUNTDOWN_SECONDS = 0.01;
        // ========================================================

        // DOM 元素
        const countdownSpan = document.getElementById('countdownNum');
        const infoTextSpan = document.getElementById('infoText');
        const targetUrlInput = document.getElementById('targetUrlInput');
        const copyBtn = document.getElementById('copyButton');
        const copyMessageDiv = document.getElementById('copyMessage');

        // 显示目标网址到输入框
        if (targetUrlInput) {
            targetUrlInput.value = TARGET_URL;
        }

        // 辅助函数: 显示临时复制反馈
        let copyTimeout = null;
        function showCopyFeedback(message, isError = false) {
            if (!copyMessageDiv) return;
            copyMessageDiv.textContent = message;
            copyMessageDiv.style.color = isError ? '#e11d48' : '#10b981';
            if (copyTimeout) clearTimeout(copyTimeout);
            copyTimeout = setTimeout(() => {
                if (copyMessageDiv) copyMessageDiv.textContent = '';
            }, 2500);
        }

        // 复制链接功能 (现代 Clipboard API 带降级)
        async function copyUrlToClipboard() {
            const urlToCopy = TARGET_URL;
            if (!urlToCopy) {
                showCopyFeedback('❌ 没有可复制的链接', true);
                return;
            }
            try {
                // 现代方法
                await navigator.clipboard.writeText(urlToCopy);
                showCopyFeedback('✅ 链接已复制！您可以直接粘贴到地址栏访问', false);
            } catch (err) {
                // 降级方案: 使用 textarea 模拟
                const textarea = document.createElement('textarea');
                textarea.value = urlToCopy;
                textarea.style.position = 'fixed';
                textarea.style.top = '-1000px';
                document.body.appendChild(textarea);
                textarea.select();
                textarea.setSelectionRange(0, 99999);
                let success = false;
                try {
                    success = document.execCommand('copy');
                } catch (e) {
                    success = false;
                }
                document.body.removeChild(textarea);
                if (success) {
                    showCopyFeedback('📋 链接已复制 (兼容模式)', false);
                } else {
                    showCopyFeedback('⚠️ 复制失败，请手动选择链接复制', true);
                }
            }
        }

        // 绑定复制按钮事件
        if (copyBtn) {
            copyBtn.addEventListener('click', (e) => {
                e.preventDefault();
                copyUrlToClipboard();
            });
        }

        // 让输入框点击时自动全选，方便用户手动复制 (体验增强)
        if (targetUrlInput) {
            targetUrlInput.addEventListener('click', (e) => {
                targetUrlInput.select();
            });
            // 可选: 也支持 focus 全选
            targetUrlInput.addEventListener('focus', () => {
                targetUrlInput.select();
            });
        }

        // 倒计时及自动跳转逻辑
        let remainingSeconds = COUNTDOWN_SECONDS;
        let timerInterval = null;
        let redirectTriggered = false;  // 防止多次跳转

        // 更新倒计时显示
        function updateCountdownDisplay() {
            if (countdownSpan) {
                countdownSpan.innerText = remainingSeconds;
            }
            // 可选：最后1秒时稍微强调一下文本
            if (remainingSeconds <= 1 && infoTextSpan) {
                infoTextSpan.innerHTML = '即将跳转，剩余 ';
            } else if (infoTextSpan) {
                infoTextSpan.innerHTML = '页面正在尝试自动跳转，剩余 ';
            }
        }

        // 执行跳转动作
        function performRedirect() {
            if (redirectTriggered) return;
            redirectTriggered = true;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            // 尝试跳转 (通过修改 window.location)
            // 使用 replace 或者 href 均可，replace 不会留下历史记录，体验更好
            try {
                window.location.replace(TARGET_URL);
            } catch (error) {
                // 某些极端沙盒环境可能抛异常，但不影响，兜底提示。
                console.warn("跳转失败，可能是安全限制", error);
                // 显示额外提示
                const redirectMsgDiv = document.getElementById('redirectMsg');
                if (redirectMsgDiv) {
                    redirectMsgDiv.innerHTML = '⚠️ 自动跳转被浏览器阻止，请手动复制上方链接访问。';
                    redirectMsgDiv.style.color = '#d97706';
                }
            }
        }

        // 开始倒计时
        function startCountdown() {
            if (remainingSeconds <= 0) {
                performRedirect();
                return;
            }
            updateCountdownDisplay();
            timerInterval = setInterval(() => {
                if (redirectTriggered) {
                    // 如果已经跳转则清理计时器
                    if (timerInterval) clearInterval(timerInterval);
                    return;
                }
                remainingSeconds--;
                updateCountdownDisplay();

                if (remainingSeconds <= 0) {
                    // 倒计时归零，执行跳转
                    if (timerInterval) clearInterval(timerInterval);
                    performRedirect();
                }
            }, 1000);
        }

        // 额外保险: 如果页面 visibility 变化 (用户切走再回来倒计时依旧精准)
        // 并且确保如果因为某些原因无法跳转，用户仍有手动方案
        // 同时监听页面焦点回来时，如果还没跳转且倒计时未结束不变，但我们只需要保证跳转最终执行即可

        // 另一种安全措施: 设置一个最大超时后备 (如果 setInterval 被延迟，确保跳转)
        // 但不影响用户体验，在倒计时结束后一定会调用 performRedirect，此处增加一个绝对延时后备
        // 避免任何意外导致 setInterval 不触发 (例如极端 cpu 繁忙，但几乎不会)
        const safetyTimeout = setTimeout(() => {
            if (!redirectTriggered && remainingSeconds > 0) {
                // 强制跳转（剩余秒数还没触发？可能是 setInterval 失效，立即执行）
                if (timerInterval) clearInterval(timerInterval);
                performRedirect();
            }
        }, (COUNTDOWN_SECONDS + 1) * 1000 + 200); // 比倒计时多一点点

        // 启动倒计时
        startCountdown();

        // 页面关闭或跳转前清理定时器，但无伤大雅
        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval);
            if (safetyTimeout) clearTimeout(safetyTimeout);
        });

        // 额外增加：如果浏览器阻止自动跳转（某些情况下弹出式窗口阻止？但 location 不受弹窗阻止）
        // 但是一些 WebView 可能限制，此时用户会看到手动复制区域，完全符合需求。
        // 此外，如果跳转目标地址非法或格式错误，那么 location 会无效，但我们依然保留了复制功能。
        // 校验目标URL合法性 (简单提醒控制台，但不干扰用户)
        try {
            const testUrl = new URL(TARGET_URL);
            if (!(testUrl.protocol === 'http:' || testUrl.protocol === 'https:')) {
                console.warn('目标网址协议不是http/https，跳转可能无效，请检查TARGET_URL配置');
                const msgDiv = document.getElementById('redirectMsg');
                if (msgDiv) {
                    msgDiv.innerHTML = '⚠️ 目标网址协议异常，跳转可能失败，请手动复制链接访问。';
                    msgDiv.style.color = '#b91c1c';
                }
            }
        } catch (e) {
            console.error('目标URL格式无效，请检查配置', e);
            const msgDiv = document.getElementById('redirectMsg');
            if (msgDiv) {
                msgDiv.innerHTML = '❌ 目标链接格式错误，请检查代码中的 TARGET_URL 配置。';
                msgDiv.style.color = '#b91c1c';
            }
            // 如果链接无效，停止自动跳转以免产生错误，并让用户手动复制
            if (timerInterval) clearInterval(timerInterval);
            redirectTriggered = true; // 禁止跳转
            if (countdownSpan) countdownSpan.innerText = '✖';
            if (infoTextSpan) infoTextSpan.innerHTML = '链接配置无效，请';
        }

        // 一个小优化: 如果用户点击复制后手动粘贴到地址栏，倒计时还是会跳转，但无伤大雅。
        // 体验增强: 防止倒计时期间用户手动跳转时仍然触发自动跳转导致覆盖（但覆盖也无大碍）
        // 若已经手动跳转离开页面，自动跳转将不会执行，因为页面已卸载。
    })();
</script>
</body>
</html>
